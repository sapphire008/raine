name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run artifact packaging tests
        run: >
          uv run pytest
          tests/test_artifact_bundle.py
          tests/test_code_trace.py
          tests/test_staging_helper.py
          -q

      - name: Build package
        run: uv build
